<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Adaptive Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center">

  <div class="w-full max-w-md bg-gray-900 border border-gray-700 rounded-2xl shadow-xl p-8">

    <!-- Header -->
    <div class="mb-8 text-center">
      <span class="inline-block bg-indigo-600 text-white text-xs font-semibold px-3 py-1 rounded-full mb-3 tracking-widest uppercase">
        Adaptive Auth System
      </span>
      <h1 class="text-2xl font-bold text-white">Sign In</h1>
      <p class="text-gray-400 text-sm mt-1">Behaviour-Based MFA Fatigue Detection</p>
    </div>

    <!-- Alert box (hidden by default) -->
    <div id="alert" class="hidden mb-4 px-4 py-3 rounded-lg text-sm font-medium"></div>

    <!-- Form -->
    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-gray-300 text-sm font-medium mb-1">Username</label>
        <input id="username" type="text" required autocomplete="username"
          class="w-full bg-gray-800 border border-gray-600 text-white rounded-lg px-4 py-2.5
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-gray-500"
          placeholder="Enter username" />
      </div>
      <div>
        <label class="block text-gray-300 text-sm font-medium mb-1">Password</label>
        <input id="password" type="password" required autocomplete="current-password"
          class="w-full bg-gray-800 border border-gray-600 text-white rounded-lg px-4 py-2.5
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-gray-500"
          placeholder="Enter password" />
      </div>

      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5
               rounded-lg transition-colors duration-200 focus:outline-none focus:ring-2
               focus:ring-indigo-400">
        Sign In
      </button>
    </form>

    <p class="text-center text-gray-500 text-sm mt-6">
      No account?
      <a href="/register" class="text-indigo-400 hover:text-indigo-300 font-medium">Register</a>
    </p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('alert');
      alertEl.className = 'hidden mb-4 px-4 py-3 rounded-lg text-sm font-medium';

      const body = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      };

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (res.ok) {
          // Store token and user info for subsequent requests
          localStorage.setItem('access_token', data.access_token);
          localStorage.setItem('user_id', data.user_id);
          localStorage.setItem('username', data.username);

          showAlert('Login successful! Sending MFA push...', 'success');

          // Trigger MFA challenge then redirect
          const mfaRes = await fetch(`/api/mfa/request?user_id=${data.user_id}`, { method: 'POST' });
          const mfaData = await mfaRes.json();
          if (mfaRes.ok && mfaData.challenge_id) {
            localStorage.setItem('challenge_id', mfaData.challenge_id);
          }
          setTimeout(() => { window.location.href = '/mfa'; }, 800);
        } else {
          showAlert(data.detail || 'Login failed.', 'error');
        }
      } catch (err) {
        showAlert('Network error. Is the server running?', 'error');
      }
    });

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `mb-4 px-4 py-3 rounded-lg text-sm font-medium ${
        type === 'success'
          ? 'bg-green-900 border border-green-600 text-green-300'
          : 'bg-red-900 border border-red-600 text-red-300'
      }`;
    }
  </script>
</body>
</html>
