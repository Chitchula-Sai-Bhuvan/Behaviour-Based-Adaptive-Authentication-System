name: Tests & Security Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: auth_test_db
          MYSQL_USER: auth_user
          MYSQL_PASSWORD: test_password
          MYSQL_ROOT_PASSWORD: root_password
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 6379:6379
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black bandit
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check code formatting with black
      run: |
        black --check app --line-length 127 || true
    
    - name: Security audit with bandit
      run: |
        bandit -r app --severity-level medium || true
    
    - name: Set up environment for tests
      env:
        DATABASE_URL: mysql+pymysql://auth_user:test_password@127.0.0.1/auth_test_db
        REDIS_HOST: 127.0.0.1
        REDIS_PORT: 6379
        SECRET_KEY: test-secret-key-for-ci-only-not-production
        REFRESH_SECRET_KEY: test-refresh-secret-key-for-ci-only
        DEBUG: 'false'
      run: |
        # Create test database tables
        python -c "from app.db.session import engine; from app.db.base import Base; Base.metadata.create_all(bind=engine)"
    
    - name: Run authentication tests
      env:
        DATABASE_URL: mysql+pymysql://auth_user:test_password@127.0.0.1/auth_test_db
        REDIS_HOST: 127.0.0.1
        REDIS_PORT: 6379
        SECRET_KEY: test-secret-key-for-ci-only-not-production
        REFRESH_SECRET_KEY: test-refresh-secret-key-for-ci-only
        DEBUG: 'false'
      run: |
        python tests/auth_failure_demo.py
    
    - name: Run attack simulation tests
      env:
        DATABASE_URL: mysql+pymysql://auth_user:test_password@127.0.0.1/auth_test_db
        REDIS_HOST: 127.0.0.1
        REDIS_PORT: 6379
        SECRET_KEY: test-secret-key-for-ci-only-not-production
        REFRESH_SECRET_KEY: test-refresh-secret-key-for-ci-only
        DEBUG: 'false'
      run: |
        python tests/simulate_attacks.py
    
    - name: Run edge case tests
      env:
        DATABASE_URL: mysql+pymysql://auth_user:test_password@127.0.0.1/auth_test_db
        REDIS_HOST: 127.0.0.1
        REDIS_PORT: 6379
        SECRET_KEY: test-secret-key-for-ci-only-not-production
        REFRESH_SECRET_KEY: test-refresh-secret-key-for-ci-only
        DEBUG: 'false'
      run: |
        python tests/test_edge_cases.py
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          test-results/
          coverage/

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint mypy
    
    - name: Type checking with mypy
      run: |
        mypy app --ignore-missing-imports || true
    
    - name: Code analysis with pylint
      run: |
        pylint app --fail-under=7 || true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run security checks with safety
      run: |
        pip install safety
        safety check --json || true
    
    - name: SAST with semgrep
      uses: returntocorp/semgrep-action@v1
      with:
        generateSarif: true
    
    - name: Upload SARIF file (for GitHub Security tab)
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: semgrep.sarif
        wait-for-processing: true

  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check for outdated dependencies
      run: |
        pip install pip-audit
        pip-audit --skip-editable || true
    
    - name: Dependency graph submission
      uses: actions/dependency-review-action@v3
      if: github.event_name == 'pull_request'
