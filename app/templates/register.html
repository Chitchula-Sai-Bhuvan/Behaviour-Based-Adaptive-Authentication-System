<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Adaptive Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center">

  <div class="w-full max-w-md bg-gray-900 border border-gray-700 rounded-2xl shadow-xl p-8">

    <div class="mb-8 text-center">
      <span class="inline-block bg-emerald-600 text-white text-xs font-semibold px-3 py-1 rounded-full mb-3 tracking-widest uppercase">
        Create Account
      </span>
      <h1 class="text-2xl font-bold text-white">Register</h1>
      <p class="text-gray-400 text-sm mt-1">Set up your secure account</p>
    </div>

    <div id="alert" class="hidden mb-4 px-4 py-3 rounded-lg text-sm font-medium"></div>

    <form id="registerForm" class="space-y-5">
      <div>
        <label class="block text-gray-300 text-sm font-medium mb-1">Username</label>
        <input id="username" type="text" required minlength="3" maxlength="64"
          class="w-full bg-gray-800 border border-gray-600 text-white rounded-lg px-4 py-2.5
                 focus:outline-none focus:ring-2 focus:ring-emerald-500 placeholder-gray-500"
          placeholder="Choose a username" />
      </div>
      <div>
        <label class="block text-gray-300 text-sm font-medium mb-1">Password</label>
        <input id="password" type="password" required minlength="8"
          class="w-full bg-gray-800 border border-gray-600 text-white rounded-lg px-4 py-2.5
                 focus:outline-none focus:ring-2 focus:ring-emerald-500 placeholder-gray-500"
          placeholder="Min. 8 characters" />
      </div>

      <!-- Password requirements hint -->
      <p class="text-gray-500 text-xs -mt-2">Must be at least 8 characters long.</p>

      <button type="submit"
        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5
               rounded-lg transition-colors duration-200 focus:outline-none focus:ring-2
               focus:ring-emerald-400">
        Create Account
      </button>
    </form>

    <p class="text-center text-gray-500 text-sm mt-6">
      Already have an account?
      <a href="/" class="text-emerald-400 hover:text-emerald-300 font-medium">Sign In</a>
    </p>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      };

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (res.ok) {
          showAlert('Account created! Redirecting to login...', 'success');
          setTimeout(() => { window.location.href = '/'; }, 1200);
        } else {
          showAlert(data.detail || 'Registration failed.', 'error');
        }
      } catch (err) {
        showAlert('Network error.', 'error');
      }
    });

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `mb-4 px-4 py-3 rounded-lg text-sm font-medium ${
        type === 'success'
          ? 'bg-green-900 border border-green-600 text-green-300'
          : 'bg-red-900 border border-red-600 text-red-300'
      }`;
    }
  </script>
</body>
</html>
