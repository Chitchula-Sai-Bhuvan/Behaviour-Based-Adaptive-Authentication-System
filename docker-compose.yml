version: '3.8'

services:
  # FastAPI Application
  app:
    build: .
    container_name: auth-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://auth_user:auth_password@db:3306/auth_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: dev-secret-key-change-in-production
      REFRESH_SECRET_KEY: dev-refresh-secret-key-change-in-production
      DEBUG: "true"
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    networks:
      - auth-network
    restart: unless-stopped

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: auth-db
    environment:
      MYSQL_DATABASE: auth_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth_password
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_INITDB_SKIP_TZINFO: 'yes'
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - auth-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: auth-redis
    command: redis-server --appendonly yes --requirepass redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - auth-network
    restart: unless-stopped

  # phpMyAdmin for database management
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: auth-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: auth_user
      PMA_PASSWORD: auth_password
      PMA_ROOT_PASSWORD: root_password
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - auth-network
    restart: unless-stopped

  # Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: auth-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis_password
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - auth-network
    restart: unless-stopped

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local

networks:
  auth-network:
    driver: bridge
